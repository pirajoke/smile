<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">⚡</span>
      <h1>AI Install</h1>
    </div>

    <div class="section">
      <label class="label" for="default-client">Default AI Client</label>
      <select id="default-client" class="select">
        <option value="">Choose on each click</option>
        <option value="claude">Claude Code</option>
        <option value="cursor">Cursor</option>
        <option value="terminal">Terminal + Claude</option>
      </select>
    </div>

    <div class="section">
      <label class="toggle-row">
        <input type="checkbox" id="one-click" class="toggle-input">
        <span class="toggle-slider"></span>
        <span class="toggle-label">One-click mode</span>
      </label>
      <p class="hint">Skip dropdown — copies default command instantly</p>
    </div>

    <div class="divider"></div>

    <div class="section">
      <p class="footer-text">Navigate to any GitHub repo to see the Install button.</p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
